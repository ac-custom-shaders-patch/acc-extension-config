[Material_Glass]
Meshes = GEO_EXTWindscreen
FilmIOR = 3.5
ExtraLightsAdjustment = 0.5
BrightnessAdjustment = 1
Refraction = 1
UseNormalMap = 0
Desaturate = 0.8


[SHAKING_EXHAUST_...]
MESHES = GEO_INT_shifterTop
POINT_0_SCALE = 0.22
POINT_0 = -0.0515, 0.685, 0.996
POINT_0_RADIUS = 1.0
POINT_0_EXP = 0.001

[ANIMATION_...]
FILE=car_door_L.ksanim
TIME= 1.3
BIND_TO_EXTRA_B=1

[ANIMATION_...]
FILE=car_door_R.ksanim
TIME= 1.3
BIND_TO_EXTRA_A=1

[ANIMATION_...]
FILE=stopwatch.ksanim
TIME= 1.3
BIND_TO_EXTRA_C=1

[ANIMATION_...]
FILE=lights.ksanim
TIME= 1.3
BIND_TO_EXTRA_E=1


[SHADER_REPLACEMENT_...]
MATERIALS = Sat_Dish,EXTbodywork,Mech,EXTlight
DOUBLE_FACE_SHADOW_BIASED = 1  
CULL_MODE = NONE
